<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
</head>
<style>
 body{
   margin:0;
   display:flex;
   justify-content: center;
   align-items: center;
   height:100vh;
   font-family: Arial,sans-serif;
 }
 .card{
   background-color:rgb(199, 223, 223);
   border-radius: 10px;
   padding: 20px;
   text-align:center;
   box-shadow: 0 4 8 rgba(10,10,10);
 }
</style>
<body>
   <div class="card" id="card">
   <h3>welcome to array finctionality</h3><br>
   <label>enter 6 numbers</label>
   <input type="number" id="num"><br><br>
   <button onclick="get()">enter array</button>
   <button onclick="add()">add array</button>
   <button onclick="maximum()">largest number</button>
   <button onclick="reverse()">reverse order</button>
   <h3 id="output"></h3>
   <h3 id="input"></h3>
   <h3 id="max"></h3>
   <h3 id="rev"></h3>
   </div>

   <script>
      let arr=[];
      let count=0;

      function reverse(){
         let print=document.getElementById("rev");
         let revert=[];
         
         for(let i=arr.length-1;i>=0;i--){
            revert.push(arr[i]);
         }
          print.innerHTML="array in reverse = "+revert.join(", ");
         
      }

      function maximum(){
      let val2=document.getElementById("max");   
      let max=arr[0];
      for(let i=0;i<arr.length;i++){
      if(max<arr[i]){
         max=arr[i];
      }
      
      }
      val2.innerHTML="maximum number = "+max;
      }

      function add(){
         let val2=document.getElementById("output");
         let sum=0;
         for(let i=0;i<arr.length;i++){
             sum=sum+arr[i];
         }
         val2.innerHTML="the sum of your array is : "+sum;
         }

      function get(){
         let a=document.getElementById("num");
         let val=document.getElementById("input");
         let val2=document.getElementById("output");
         
         if(count<6){
         arr[count]=Number(a.value);
         count++;
         a.value="";
         val.innerHTML="number entered = "+count;
         }
         if(count===6){
         val.innerHTML="number entered = "+arr.join(", ")
        
      }
   }
    

   
   </script>
</body>
</html>
